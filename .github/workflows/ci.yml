name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  documentation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"
      - name: Check public repository hygiene
        shell: bash
        run: |
          if find . -name .DS_Store -o -name Thumbs.db | grep -q .; then
            echo "OS-generated files must not be committed."
            exit 1
          fi
          deprecated_checkout='actions/checkout@v''4'
          deprecated_markdownlint='DavidAnson/markdownlint-cli2-action@v''20'
          if grep -R -n -F \
            -e "$deprecated_checkout" \
            -e "$deprecated_markdownlint" \
            .github/workflows; then
            echo "Deprecated Node runtime actions are not allowed."
            exit 1
          fi
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --max-retries 2 "**/*.md"
          fail: true
